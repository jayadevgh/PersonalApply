<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saved Templates — PersonalApply</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f0f; color: #e8e8e8; min-height: 100vh; }

    header { padding: 14px 20px; background: #1a1a1a; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 15px; font-weight: 600; color: #fff; }
    .nav-link { font-size: 13px; color: #666; text-decoration: none; }
    .nav-link:hover { color: #aaa; }

    .toolbar { padding: 14px 24px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #1f1f1f; }
    #search { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 7px 12px; color: #e8e8e8; font-size: 13px; font-family: inherit; width: 280px; }
    #search:focus { outline: none; border-color: #4a9eff; }
    #count { font-size: 12px; color: #555; margin-left: auto; }

    #list { padding: 16px 24px; display: flex; flex-direction: column; gap: 8px; }
    .empty { color: #444; font-size: 14px; text-align: center; padding: 60px; }

    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .card-header { display: flex; align-items: flex-start; gap: 10px; }
    .card-meta { flex: 1; }
    .card-title { font-size: 14px; color: #fff; font-weight: 500; margin-bottom: 3px; }
    .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .tag { background: #252525; border: 1px solid #333; border-radius: 4px; padding: 1px 7px; font-size: 11px; color: #888; }
    .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-sm { padding: 5px 12px; border: none; border-radius: 5px; font-size: 12px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
    .btn-sm:hover { opacity: 0.8; }
    .btn-edit { background: #2a2a2a; color: #aaa; }
    .btn-delete { background: #2a1a1a; color: #e53e3e; }
    .btn-save { background: #4a9eff; color: #fff; }
    .btn-cancel { background: #2a2a2a; color: #888; }

    .card-body { font-size: 13px; color: #ccc; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .card-key { font-size: 11px; color: #444; font-family: monospace; }

    .edit-area { width: 100%; min-height: 80px; background: #141414; border: 1px solid #4a9eff; border-radius: 6px; padding: 10px; color: #e8e8e8; font-size: 13px; font-family: inherit; line-height: 1.5; resize: vertical; }
    .edit-area:focus { outline: none; }
    .edit-actions { display: flex; gap: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>Saved Templates</h1>
    <a class="nav-link" href="/ui/blocked">← Blocked questions</a>
  </header>

  <div class="toolbar">
    <input id="search" placeholder="Filter by title or category…" oninput="renderList()">
    <span id="count"></span>
  </div>

  <div id="list"><div class="empty">Loading…</div></div>

  <script>
    let templates = [];
    let editingId = null;

    async function load() {
      const res = await fetch('/answers/templates');
      templates = res.ok ? await res.json() : [];
      renderList();
    }

    function renderList() {
      const q = document.getElementById('search').value.toLowerCase();
      const filtered = templates.filter(t =>
        !q || t.title.toLowerCase().includes(q) || t.category.toLowerCase().includes(q)
      );

      document.getElementById('count').textContent = `${filtered.length} template${filtered.length !== 1 ? 's' : ''}`;

      const el = document.getElementById('list');
      if (filtered.length === 0) {
        el.innerHTML = '<div class="empty">No templates yet</div>';
        return;
      }

      el.innerHTML = filtered.map(t => `
        <div class="card" id="card-${t.id}">
          <div class="card-header">
            <div class="card-meta">
              <div class="card-title">${esc(t.title)}</div>
              <div class="card-tags">
                <span class="tag">${esc(t.category)}</span>
                ${(t.tags || []).map(tag => `<span class="tag">${esc(tag)}</span>`).join('')}
              </div>
            </div>
            <div class="card-actions">
              <button class="btn-sm btn-edit" onclick="startEdit('${t.id}')">Edit</button>
              <button class="btn-sm btn-delete" onclick="deleteTemplate('${t.id}')">Delete</button>
            </div>
          </div>
          <div class="card-body" id="body-${t.id}">${esc(t.answer_text)}</div>
          <div class="card-key">${esc(t.category)}${t.field_type ? ' · ' + esc(t.field_type) : ''}${t.times_used ? ' · used ' + t.times_used + 'x' : ''}</div>
        </div>
      `).join('');
    }

    function startEdit(id) {
      const t = templates.find(t => t.id === id);
      if (!t) return;
      editingId = id;

      const bodyEl = document.getElementById(`body-${id}`);
      const card = document.getElementById(`card-${id}`);

      bodyEl.innerHTML = `
        <textarea class="edit-area" id="edit-${id}">${esc(t.answer_text)}</textarea>
        <div class="edit-actions">
          <button class="btn-sm btn-save" onclick="saveEdit('${id}')">Save</button>
          <button class="btn-sm btn-cancel" onclick="cancelEdit('${id}')">Cancel</button>
        </div>
      `;
      document.getElementById(`edit-${id}`).focus();
    }

    function cancelEdit(id) {
      const t = templates.find(t => t.id === id);
      if (!t) return;
      document.getElementById(`body-${id}`).innerHTML = esc(t.answer_text);
    }

    async function saveEdit(id) {
      const newText = document.getElementById(`edit-${id}`).value.trim();
      if (!newText) return;

      const res = await fetch(`/answers/templates/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ answer_text: newText }),
      });

      if (res.ok) {
        const updated = await res.json();
        const idx = templates.findIndex(t => t.id === id);
        if (idx !== -1) templates[idx] = updated;
        renderList();
      }
    }

    async function deleteTemplate(id) {
      if (!confirm('Delete this template? The worker will ask you again next time.')) return;

      const res = await fetch(`/answers/templates/${id}`, { method: 'DELETE' });
      if (res.ok) {
        templates = templates.filter(t => t.id !== id);
        renderList();
      }
    }

    function esc(str) {
      return String(str || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    load();
  </script>
</body>
</html>
